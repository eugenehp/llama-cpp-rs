name: Publish to Crates.io

on:
  release:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN != '' && secrets.CARGO_REGISTRY_TOKEN || secrets.CRATES_IO_TOKEN }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Validate crates.io token
        run: |
          if [ -z "$CARGO_TOKEN" ]; then
            echo "Missing crates.io token secret. Set CARGO_REGISTRY_TOKEN or CRATES_IO_TOKEN." >&2
            exit 1
          fi
      - name: Publish crates for llama-cpp-sys-4
        run: RUST_BACKTRACE=1 cargo publish --package llama-cpp-sys-4 --token "$CARGO_TOKEN" --verbose
      - name: Publish crates for llama-cpp-4
        run: RUST_BACKTRACE=1 cargo publish --package llama-cpp-4 --token "$CARGO_TOKEN" --verbose
        
      # Trigger the 'update-toml-version' workflow
      - name: Dispatch Update TOML Version Event
        if: success()  # Ensure this runs only if the previous steps were successful
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            --input - << 'EOF'
          {"event_type":"trigger-update-toml-version"}
          EOF
