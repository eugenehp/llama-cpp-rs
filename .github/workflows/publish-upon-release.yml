name: Publish to Crates.io

on:
  release:
    types:
      - created
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish crates for llama-cpp-sys-4
        run: RUST_BACKTRACE=1 cargo publish --package llama-cpp-sys-4 --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --verbose 
      - name: Publish crates for llama-cpp-4
        run: RUST_BACKTRACE=1 cargo publish --package llama-cpp-4 --token ${{ secrets.CARGO_REGISTRY_TOKEN }} --verbose 
        
      # Trigger the 'update-toml-version' workflow
      - name: Dispatch Update TOML Version Event
        if: success()  # Ensure this runs only if the previous steps were successful
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            --input - << 'EOF'
          {"event_type":"trigger-update-toml-version"}
          EOF
