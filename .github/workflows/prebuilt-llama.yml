name: Build prebuilt llama artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: Upload artifacts to the selected tag release
        type: boolean
        default: false
      include_experimental:
        description: Also run experimental backend/target variants (may fail)
        type: boolean
        default: false
      tag:
        description: Existing tag to upload assets to (workflow_dispatch only)
        required: false
        default: ""

permissions:
  contents: write

env:
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_CACHE_SIZE: "10G"
  SCCACHE_GHA_VERSION: prebuilt-v1

jobs:
  linux-prebuilt:
    name: Linux prebuilt (${{ matrix.label }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: cpu
            suffix: cpu
            features: ""
            vulkan: false
            blas: false
          - label: q1
            suffix: q1
            features: q1
            vulkan: false
            blas: false
          - label: vulkan
            suffix: vulkan
            features: vulkan
            vulkan: true
            blas: false
          - label: q1+vulkan
            suffix: q1-vulkan
            features: q1,vulkan
            vulkan: true
            blas: false
          - label: blas
            suffix: blas
            features: blas
            vulkan: false
            blas: true
          - label: q1+blas
            suffix: q1-blas
            features: q1,blas
            vulkan: false
            blas: true
    env:
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Compute asset name
        shell: bash
        run: |
          echo "ASSET_NAME=llama-prebuilt-linux-${TARGET_TRIPLE}-${{ matrix.suffix }}.tar.gz" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake git mold \
            libclang-dev libssl-dev

      - name: Install Vulkan dependencies
        if: matrix.vulkan
        run: |
          sudo apt-get install -y libvulkan-dev glslang-tools
          if ! command -v glslc >/dev/null 2>&1; then
            sudo apt-get install -y glslc || sudo apt-get install -y shaderc
          fi

      - name: Install BLAS dependencies
        if: matrix.blas
        run: |
          sudo apt-get install -y libopenblas-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-linux-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-v2
          cache-targets: false
          cache-on-failure: false

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.features }}" ]]; then
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }}"
          else
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          mkdir -p "$ROOT/lib" "$ROOT/lib64" "$ROOT/bin"

          while IFS= read -r -d '' f; do
            rel="${f##*/out/}"
            subdir="${rel%%/*}"
            base="$(basename "$f")"
            case "$subdir" in
              lib|lib64|bin) cp -f "$f" "$ROOT/$subdir/$base" ;;
            esac
          done < <(find target -type f \( \
            -path "*/build/llama-cpp-sys-4-*/out/lib/*.a" -o \
            -path "*/build/llama-cpp-sys-4-*/out/lib/*.so" -o \
            -path "*/build/llama-cpp-sys-4-*/out/lib64/*.a" -o \
            -path "*/build/llama-cpp-sys-4-*/out/lib64/*.so" -o \
            -path "*/build/llama-cpp-sys-4-*/out/bin/*.so" \
          \) -print0)

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","sha":"${GITHUB_SHA}"}
          EOF

          tar -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ runner.temp }}/${{ env.ASSET_NAME }}

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          files: ${{ runner.temp }}/${{ env.ASSET_NAME }}

  windows-prebuilt:
    name: Windows prebuilt (${{ matrix.label }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x64 cpu
            target: x86_64-pc-windows-msvc
            suffix: cpu
            features: ""
            vulkan: false
          - label: x64 q1
            target: x86_64-pc-windows-msvc
            suffix: q1
            features: q1
            vulkan: false
          - label: x64 vulkan
            target: x86_64-pc-windows-msvc
            suffix: vulkan
            features: vulkan
            vulkan: true
          - label: x64 q1+vulkan
            target: x86_64-pc-windows-msvc
            suffix: q1-vulkan
            features: q1,vulkan
            vulkan: true
    env:
      TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Compute asset name
        shell: bash
        run: |
          echo "ASSET_NAME=llama-prebuilt-windows-${TARGET_TRIPLE}-${{ matrix.suffix }}.tar.gz" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-windows-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-v2
          cache-targets: false
          cache-on-failure: false

      - name: Install Vulkan SDK
        if: matrix.vulkan
        shell: powershell
        run: |
          choco install vulkan-sdk --yes --no-progress
          $sdk = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw 'Vulkan SDK not found' }
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.features }}" ]]; then
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }}"
          else
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          mkdir -p "$ROOT/lib" "$ROOT/lib64" "$ROOT/bin"

          while IFS= read -r -d '' f; do
            rel="${f##*/out/}"
            subdir="${rel%%/*}"
            base="$(basename "$f")"
            case "$subdir" in
              lib|lib64|bin) cp -f "$f" "$ROOT/$subdir/$base" ;;
            esac
          done < <(find target -type f \( \
            -path "*/build/llama-cpp-sys-4-*/out/lib/*.lib" -o \
            -path "*/build/llama-cpp-sys-4-*/out/lib/*.dll" -o \
            -path "*/build/llama-cpp-sys-4-*/out/lib64/*.lib" -o \
            -path "*/build/llama-cpp-sys-4-*/out/lib64/*.dll" -o \
            -path "*/build/llama-cpp-sys-4-*/out/bin/*.dll" \
          \) -print0)

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","sha":"${GITHUB_SHA}"}
          EOF

          tar --force-local -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ runner.temp }}/${{ env.ASSET_NAME }}

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          files: ${{ runner.temp }}/${{ env.ASSET_NAME }}

  macos-prebuilt:
    name: macOS prebuilt (${{ matrix.label }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: arm64 cpu
            target: aarch64-apple-darwin
            suffix: cpu
            features: ""
          - label: arm64 q1
            target: aarch64-apple-darwin
            suffix: q1
            features: q1
          - label: arm64 metal
            target: aarch64-apple-darwin
            suffix: metal
            features: metal
          - label: arm64 q1+metal
            target: aarch64-apple-darwin
            suffix: q1-metal
            features: q1,metal
    env:
      TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Compute asset name
        shell: bash
        run: |
          echo "ASSET_NAME=llama-prebuilt-macos-${TARGET_TRIPLE}-${{ matrix.suffix }}.tar.gz" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-macos-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-v2
          cache-targets: false
          cache-on-failure: false

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.features }}" ]]; then
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }}"
          else
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          mkdir -p "$ROOT/lib" "$ROOT/lib64" "$ROOT/bin"

          while IFS= read -r -d '' f; do
            rel="${f##*/out/}"
            subdir="${rel%%/*}"
            base="$(basename "$f")"
            case "$subdir" in
              lib|lib64|bin) cp -f "$f" "$ROOT/$subdir/$base" ;;
            esac
          done < <(find target -type f \( \
            -path "*/build/llama-cpp-sys-4-*/out/lib/*.a" -o \
            -path "*/build/llama-cpp-sys-4-*/out/lib/*.dylib" -o \
            -path "*/build/llama-cpp-sys-4-*/out/lib64/*.a" -o \
            -path "*/build/llama-cpp-sys-4-*/out/lib64/*.dylib" -o \
            -path "*/build/llama-cpp-sys-4-*/out/bin/*.dylib" \
          \) -print0)

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","sha":"${GITHUB_SHA}"}
          EOF

          tar -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ runner.temp }}/${{ env.ASSET_NAME }}

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}
          files: ${{ runner.temp }}/${{ env.ASSET_NAME }}

  linux-prebuilt-experimental:
    name: Linux experimental (${{ matrix.label }})
    if: github.event_name == 'workflow_dispatch' && inputs.include_experimental == true
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: webgpu
            suffix: webgpu
            features: webgpu
            webgpu: true
            opencl: false
            cuda: false
            hip: false
          - label: q1+webgpu
            suffix: q1-webgpu
            features: q1,webgpu
            webgpu: true
            opencl: false
            cuda: false
            hip: false
          - label: opencl
            suffix: opencl
            features: opencl
            webgpu: false
            opencl: true
            cuda: false
            hip: false
          - label: q1+opencl
            suffix: q1-opencl
            features: q1,opencl
            webgpu: false
            opencl: true
            cuda: false
            hip: false
          - label: cuda
            suffix: cuda
            features: cuda
            webgpu: false
            opencl: false
            cuda: true
            hip: false
          - label: q1+cuda
            suffix: q1-cuda
            features: q1,cuda
            webgpu: false
            opencl: false
            cuda: true
            hip: false
          - label: hip
            suffix: hip
            features: hip
            webgpu: false
            opencl: false
            cuda: false
            hip: true
          - label: q1+hip
            suffix: q1-hip
            features: q1,hip
            webgpu: false
            opencl: false
            cuda: false
            hip: true
    env:
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config cmake git libclang-dev libssl-dev

      - name: Install WebGPU dependencies
        if: matrix.webgpu
        run: |
          sudo apt-get install -y libdawn-dev || true
          DAWN_CMAKE_DIR="$(dpkg -L libdawn-dev 2>/dev/null | grep -E 'DawnConfig\.cmake$' | head -n1 || true)"
          if [[ -n "$DAWN_CMAKE_DIR" ]]; then
            DAWN_CMAKE_PREFIX="$(dirname "$(dirname "$DAWN_CMAKE_DIR")")"
            echo "CMAKE_PREFIX_PATH=$DAWN_CMAKE_PREFIX${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> "$GITHUB_ENV"
          fi

      - name: Install OpenCL dependencies
        if: matrix.opencl
        run: |
          sudo apt-get install -y ocl-icd-opencl-dev opencl-headers clinfo || true

      - name: Install CUDA dependencies
        if: matrix.cuda
        run: |
          sudo apt-get install -y nvidia-cuda-toolkit || true

      - name: Install HIP/ROCm dependencies
        if: matrix.hip
        run: |
          sudo apt-get install -y rocm-hip-sdk hipcc || true
          if [[ -d /opt/rocm ]]; then
            echo "ROCM_PATH=/opt/rocm" >> "$GITHUB_ENV"
            echo "HIP_PATH=/opt/rocm/hip" >> "$GITHUB_ENV"
            echo "/opt/rocm/bin" >> "$GITHUB_PATH"
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-linux-exp-${{ matrix.suffix }}-v1
          cache-targets: false
          cache-on-failure: false

      - name: Build (experimental smoke)
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p llama-cpp-4 --release --target "${TARGET_TRIPLE}" --no-default-features --features "${{ matrix.features }}"

  windows-prebuilt-experimental:
    name: Windows experimental (${{ matrix.label }})
    if: github.event_name == 'workflow_dispatch' && inputs.include_experimental == true
    runs-on: windows-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x64 opencl
            target: x86_64-pc-windows-msvc
            features: opencl
            opencl: true
            cuda: false
            arm64: false
          - label: x64 q1+opencl
            target: x86_64-pc-windows-msvc
            features: q1,opencl
            opencl: true
            cuda: false
            arm64: false
          - label: x64 cuda
            target: x86_64-pc-windows-msvc
            features: cuda
            opencl: false
            cuda: true
            arm64: false
          - label: x64 q1+cuda
            target: x86_64-pc-windows-msvc
            features: q1,cuda
            opencl: false
            cuda: true
            arm64: false
          - label: arm64 cpu
            target: aarch64-pc-windows-msvc
            features: ""
            opencl: false
            cuda: false
            arm64: true
          - label: arm64 q1
            target: aarch64-pc-windows-msvc
            features: q1
            opencl: false
            cuda: false
            arm64: true
    env:
      TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-windows-exp-${{ matrix.target }}-${{ matrix.features }}-v1
          cache-targets: false
          cache-on-failure: false

      - name: Install OpenCL SDK (experimental)
        if: matrix.opencl
        shell: powershell
        run: |
          choco install intel-opencl-sdk --yes --no-progress || choco install opencl --yes --no-progress || true

      - name: Install CUDA toolkit (experimental)
        if: matrix.cuda
        shell: powershell
        run: |
          choco install cuda --yes --no-progress || true

      - name: Install LLVM for ARM64 clang (experimental)
        if: matrix.arm64
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "19"
          directory: C:\LLVM

      - name: Export ARM64 clang toolchain env (experimental)
        if: matrix.arm64
        shell: powershell
        run: |
          "CC=C:\LLVM\bin\clang.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=C:\LLVM\bin\clang++.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build (experimental smoke)
        shell: bash
        env:
          CC: ${{ env.CC }}
          CXX: ${{ env.CXX }}
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.features }}" ]]; then
            cargo build -p llama-cpp-4 --release --target "${TARGET_TRIPLE}" --no-default-features --features "${{ matrix.features }}"
          else
            cargo build -p llama-cpp-4 --release --target "${TARGET_TRIPLE}" --no-default-features
          fi
