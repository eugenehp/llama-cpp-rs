name: Build prebuilt llama artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: Upload artifacts to the selected tag release
        type: boolean
        default: false
      tag:
        description: Existing tag to upload assets to (workflow_dispatch only)
        required: false
        default: ""
      platform:
        description: OS to build (tag pushes always build all)
        type: choice
        default: all
        options:
          - all
          - linux
          - windows
          - macos
      variant:
        description: Backend variant (tag pushes always build all)
        type: choice
        default: all
        options:
          - all
          - cpu
          - vulkan
          - blas
          - metal
      library_type:
        description: Library linkage (tag pushes always build static and dynamic)
        type: choice
        default: static
        options:
          - static
          - dynamic
          - both

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  plan:
    name: Plan prebuilt matrix
    runs-on: ubuntu-latest
    outputs:
      build_linux: ${{ steps.filter.outputs.build_linux }}
      build_windows: ${{ steps.filter.outputs.build_windows }}
      build_macos: ${{ steps.filter.outputs.build_macos }}
      linux_matrix: ${{ steps.filter.outputs.linux_matrix }}
      windows_matrix: ${{ steps.filter.outputs.windows_matrix }}
      macos_matrix: ${{ steps.filter.outputs.macos_matrix }}
    steps:
      - uses: actions/checkout@v7
      - name: Filter matrix
        id: filter
        env:
          MATRIX_JSON: ${{ github.workspace }}/.github/prebuilt-matrix.json
          PLATFORM: ${{ inputs.platform || 'all' }}
          VARIANT: ${{ inputs.variant || 'all' }}
          LIBRARY_TYPE: ${{ inputs.library_type || 'both' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python3 .github/scripts/filter-prebuilt-matrix.py

  linux-prebuilt:
    name: Linux prebuilt (${{ matrix.label }} - ${{ matrix.library_type }})
    needs: plan
    if: needs.plan.outputs.build_linux == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.linux_matrix) }}
    env:
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Compute asset name
        shell: bash
        run: |
          LIBRARY_TYPE="${{ matrix.library_type }}"
          echo "ASSET_NAME=llama-prebuilt-linux-${TARGET_TRIPLE}-${{ matrix.suffix }}-${LIBRARY_TYPE}.tar.gz" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake git mold \
            libclang-dev libssl-dev

      - name: Install Vulkan dependencies
        if: matrix.vulkan
        run: |
          sudo apt-get install -y libvulkan-dev glslang-tools spirv-headers
          if ! command -v glslc >/dev/null 2>&1; then
            sudo apt-get install -y glslc || sudo apt-get install -y shaderc
          fi

      - name: Install BLAS dependencies
        if: matrix.blas
        run: |
          sudo apt-get install -y libopenblas-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-linux-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-${{ matrix.library_type }}-v4
          cache-targets: false
          cache-on-failure: false

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        run: |
          set -euo pipefail
          LIBRARY_TYPE="${{ matrix.library_type }}"

          if [[ "$LIBRARY_TYPE" == "dynamic" ]]; then
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }},dynamic-link"
          else
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }}"
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          LIBRARY_TYPE="${{ matrix.library_type }}"
          bash .github/scripts/collect-linux-prebuilt.sh "$ROOT" "$LIBRARY_TYPE"

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","library_type":"$LIBRARY_TYPE","sha":"${GITHUB_SHA}"}
          EOF

          tar -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}"
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Prebuilt artifacts for $TAG_NAME"
          fi
          gh release upload "$TAG_NAME" "$RUNNER_TEMP/$ASSET_NAME" --clobber

  windows-prebuilt:
    name: Windows prebuilt (${{ matrix.label }} - ${{ matrix.library_type }})
    needs: plan
    if: needs.plan.outputs.build_windows == 'true'
    runs-on: windows-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.windows_matrix) }}
    env:
      TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Ensure patch.exe is discoverable
        shell: pwsh
        run: |
          $gitUsrBin = Join-Path $env:ProgramFiles 'Git\usr\bin'
          if (Test-Path $gitUsrBin) {
            if (-not ($env:PATH -split ';' | Where-Object { $_ -ieq $gitUsrBin })) {
              $gitUsrBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

      - name: Compute asset name
        shell: bash
        run: |
          LIBRARY_TYPE="${{ matrix.library_type }}"
          echo "ASSET_NAME=llama-prebuilt-windows-${TARGET_TRIPLE}-${{ matrix.suffix }}-${LIBRARY_TYPE}.tar.gz" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-windows-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-${{ matrix.library_type }}-v4
          cache-targets: false
          cache-on-failure: false

      - name: Setup Vulkan SDK
        if: matrix.vulkan
        uses: ./.github/actions/setup-vulkan-sdk-windows

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        run: |
          set -euo pipefail
          LIBRARY_TYPE="${{ matrix.library_type }}"

          if [[ "$LIBRARY_TYPE" == "dynamic" ]]; then
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }},dynamic-link"
          else
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }}"
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          LIBRARY_TYPE="${{ matrix.library_type }}"
          bash .github/scripts/collect-windows-prebuilt.sh "$ROOT" "$LIBRARY_TYPE"

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","library_type":"$LIBRARY_TYPE","sha":"${GITHUB_SHA}"}
          EOF

          tar --force-local -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}"
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Prebuilt artifacts for $TAG_NAME"
          fi
          gh release upload "$TAG_NAME" "$RUNNER_TEMP/$ASSET_NAME" --clobber

  macos-prebuilt:
    name: macOS prebuilt (${{ matrix.label }} - ${{ matrix.library_type }})
    needs: plan
    if: needs.plan.outputs.build_macos == 'true'
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.macos_matrix) }}
    env:
      TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Compute asset name
        shell: bash
        run: |
          LIBRARY_TYPE="${{ matrix.library_type }}"
          echo "ASSET_NAME=llama-prebuilt-macos-${TARGET_TRIPLE}-${{ matrix.suffix }}-${LIBRARY_TYPE}.tar.gz" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-macos-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-${{ matrix.library_type }}-v4
          cache-targets: false
          cache-on-failure: false

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        run: |
          set -euo pipefail
          LIBRARY_TYPE="${{ matrix.library_type }}"

          if [[ "$LIBRARY_TYPE" == "dynamic" ]]; then
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }},dynamic-link"
          else
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }}"
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          mkdir -p "$ROOT/lib" "$ROOT/lib64" "$ROOT/bin"
          LIBRARY_TYPE="${{ matrix.library_type }}"

          while IFS= read -r -d '' f; do
            base="$(basename "$f")"
            case "$base" in
              libllama*|libggml*|libcommon*|libmtmd*)
                case "$base" in
                  *.so|*.dylib)
                    if [[ "$LIBRARY_TYPE" == "dynamic" ]]; then
                      cp -f "$f" "$ROOT/lib/$base"
                    fi
                    ;;
                  *.a)
                    if [[ "$LIBRARY_TYPE" == "static" ]]; then
                      cp -f "$f" "$ROOT/lib/$base"
                    fi
                    ;;
                esac
                ;;
            esac
          done < <(find target -type f \( -name 'lib*.a' -o -name 'lib*.so' -o -name 'lib*.dylib' \) -print0)

          COUNT="$(find "$ROOT/lib" -type f 2>/dev/null | wc -l | tr -d ' ')"
          if [[ "$COUNT" -lt 1 ]]; then
            echo "::error::No libraries collected for ${ASSET_NAME}"
            exit 1
          fi

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","library_type":"$LIBRARY_TYPE","sha":"${GITHUB_SHA}"}
          EOF

          tar -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}"
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Prebuilt artifacts for $TAG_NAME"
          fi
          gh release upload "$TAG_NAME" "$RUNNER_TEMP/$ASSET_NAME" --clobber
