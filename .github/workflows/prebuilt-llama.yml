name: Build prebuilt llama artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: Upload artifacts to the selected tag release
        type: boolean
        default: false
      tag:
        description: Existing tag to upload assets to (workflow_dispatch only)
        required: false
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-prebuilt:
    name: Linux prebuilt (${{ matrix.label }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: cpu
            suffix: cpu
            features: ""
            vulkan: false
            blas: false
          - label: q1
            suffix: q1
            features: q1
            vulkan: false
            blas: false
          - label: vulkan
            suffix: vulkan
            features: vulkan
            vulkan: true
            blas: false
          - label: q1+vulkan
            suffix: q1-vulkan
            features: q1,vulkan
            vulkan: true
            blas: false
          - label: blas
            suffix: blas
            features: blas
            vulkan: false
            blas: true
          - label: q1+blas
            suffix: q1-blas
            features: q1,blas
            vulkan: false
            blas: true
    env:
      TARGET_TRIPLE: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Compute asset name
        shell: bash
        run: |
          echo "ASSET_NAME=llama-prebuilt-linux-${TARGET_TRIPLE}-${{ matrix.suffix }}.tar.gz" >> "$GITHUB_ENV"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config cmake git mold \
            libclang-dev libssl-dev

      - name: Install Vulkan dependencies
        if: matrix.vulkan
        run: |
          sudo apt-get install -y libvulkan-dev glslang-tools
          if ! command -v glslc >/dev/null 2>&1; then
            sudo apt-get install -y glslc || sudo apt-get install -y shaderc
          fi

      - name: Install BLAS dependencies
        if: matrix.blas
        run: |
          sudo apt-get install -y libopenblas-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-linux-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-v2
          cache-targets: false
          cache-on-failure: false

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        env:
          RUSTFLAGS: -C link-arg=-fuse-ld=mold
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.features }}" ]]; then
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }}"
          else
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          mkdir -p "$ROOT/lib" "$ROOT/lib64" "$ROOT/bin"

          # Resolve the exact CMake install roots used by the current build.
          output_files="$RUNNER_TEMP/llama-output-files.txt"
          roots_raw="$RUNNER_TEMP/llama-roots-raw.txt"
          roots_unique="$RUNNER_TEMP/llama-roots-unique.txt"

          find "target/${TARGET_TRIPLE}/release/build" -type f -path "*/llama-cpp-sys-4-*/output" > "$output_files" 2>/dev/null || true
          if [[ ! -s "$output_files" ]]; then
            find target -type f -path "*/build/llama-cpp-sys-4-*/output" > "$output_files" 2>/dev/null || true
          fi

          : > "$roots_raw"
          while IFS= read -r output; do
            sed -n 's/^cargo:root=//p' "$output" >> "$roots_raw" || true
          done < "$output_files"
          sort -u "$roots_raw" > "$roots_unique"

          copied=0
          while IFS= read -r root; do
            [[ -n "$root" && -d "$root" ]] || continue
            echo "Collecting from root: $root"
            for subdir in lib lib64 bin; do
              dir="$root/$subdir"
              [[ -d "$dir" ]] || continue
              while IFS= read -r -d '' f; do
                cp -f "$f" "$ROOT/$subdir/$(basename "$f")"
                copied=$((copied + 1))
              done < <(find "$dir" -maxdepth 1 -type f \( -name '*.a' -o -name '*.so' \) -print0)
            done
          done < "$roots_unique"

          if [[ "$copied" -eq 0 ]]; then
            echo "No compiled libraries were collected; failing instead of uploading empty artifact." >&2
            echo "Searched output files:" >&2
            sed 's/^/ - /' "$output_files" >&2 || true
            exit 1
          fi

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","sha":"${GITHUB_SHA}"}
          EOF

          tar -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .
          ls -lh "$RUNNER_TEMP/$ASSET_NAME"
          tar -tzf "$RUNNER_TEMP/$ASSET_NAME"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ runner.temp }}/${{ env.ASSET_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}" "$RUNNER_TEMP/$ASSET_NAME" --clobber

  windows-prebuilt:
    name: Windows prebuilt (${{ matrix.label }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x64 cpu
            target: x86_64-pc-windows-msvc
            suffix: cpu
            features: ""
            vulkan: false
          - label: x64 q1
            target: x86_64-pc-windows-msvc
            suffix: q1
            features: q1
            vulkan: false
          - label: x64 vulkan
            target: x86_64-pc-windows-msvc
            suffix: vulkan
            features: vulkan
            vulkan: true
          - label: x64 q1+vulkan
            target: x86_64-pc-windows-msvc
            suffix: q1-vulkan
            features: q1,vulkan
            vulkan: true
    env:
      TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Compute asset name
        shell: bash
        run: |
          echo "ASSET_NAME=llama-prebuilt-windows-${TARGET_TRIPLE}-${{ matrix.suffix }}.tar.gz" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-windows-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-v2
          cache-targets: false
          cache-on-failure: false

      - name: Install Vulkan SDK
        if: matrix.vulkan
        shell: powershell
        run: |
          choco install vulkan-sdk --yes --no-progress
          $sdk = Get-ChildItem 'C:\VulkanSDK' -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) { throw 'Vulkan SDK not found' }
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.features }}" ]]; then
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }}"
          else
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          mkdir -p "$ROOT/lib" "$ROOT/lib64" "$ROOT/bin"

          output_files="$RUNNER_TEMP/llama-output-files.txt"
          roots_raw="$RUNNER_TEMP/llama-roots-raw.txt"
          roots_unique="$RUNNER_TEMP/llama-roots-unique.txt"

          find "target/${TARGET_TRIPLE}/release/build" -type f -path "*/llama-cpp-sys-4-*/output" > "$output_files" 2>/dev/null || true
          if [[ ! -s "$output_files" ]]; then
            find target -type f -path "*/build/llama-cpp-sys-4-*/output" > "$output_files" 2>/dev/null || true
          fi

          : > "$roots_raw"
          while IFS= read -r output; do
            sed -n 's/^cargo:root=//p' "$output" >> "$roots_raw" || true
          done < "$output_files"
          sort -u "$roots_raw" > "$roots_unique"

          copied=0
          while IFS= read -r root; do
            [[ -n "$root" && -d "$root" ]] || continue
            echo "Collecting from root: $root"
            for subdir in lib lib64 bin; do
              dir="$root/$subdir"
              [[ -d "$dir" ]] || continue
              while IFS= read -r -d '' f; do
                cp -f "$f" "$ROOT/$subdir/$(basename "$f")"
                copied=$((copied + 1))
              done < <(find "$dir" -maxdepth 1 -type f \( -name '*.lib' -o -name '*.dll' \) -print0)
            done
          done < "$roots_unique"

          if [[ "$copied" -eq 0 ]]; then
            echo "No compiled libraries were collected; failing instead of uploading empty artifact." >&2
            echo "Searched output files:" >&2
            sed 's/^/ - /' "$output_files" >&2 || true
            exit 1
          fi

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","sha":"${GITHUB_SHA}"}
          EOF

          tar --force-local -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .
          ls -lh "$RUNNER_TEMP/$ASSET_NAME"
          tar --force-local -tzf "$RUNNER_TEMP/$ASSET_NAME"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ runner.temp }}/${{ env.ASSET_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}" "$RUNNER_TEMP/$ASSET_NAME" --clobber

  macos-prebuilt:
    name: macOS prebuilt (${{ matrix.label }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: arm64 cpu
            target: aarch64-apple-darwin
            suffix: cpu
            features: ""
          - label: arm64 q1
            target: aarch64-apple-darwin
            suffix: q1
            features: q1
          - label: arm64 metal
            target: aarch64-apple-darwin
            suffix: metal
            features: metal
          - label: arm64 q1+metal
            target: aarch64-apple-darwin
            suffix: q1-metal
            features: q1,metal
    env:
      TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Compute asset name
        shell: bash
        run: |
          echo "ASSET_NAME=llama-prebuilt-macos-${TARGET_TRIPLE}-${{ matrix.suffix }}.tar.gz" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2.9.0
        with:
          workspaces: ". -> target"
          shared-key: prebuilt-macos-${{ env.TARGET_TRIPLE }}-${{ matrix.suffix }}-v2
          cache-targets: false
          cache-on-failure: false

      - name: Build llama-cpp-4 (prebuilt target)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.features }}" ]]; then
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features \
              --features "${{ matrix.features }}"
          else
            cargo build -p llama-cpp-4 \
              --release \
              --target "${TARGET_TRIPLE}" \
              --no-default-features
          fi

      - name: Collect prebuilt libraries
        shell: bash
        run: |
          set -euo pipefail
          ROOT="$RUNNER_TEMP/prebuilt"
          mkdir -p "$ROOT/lib" "$ROOT/lib64" "$ROOT/bin"

          output_files="$RUNNER_TEMP/llama-output-files.txt"
          roots_raw="$RUNNER_TEMP/llama-roots-raw.txt"
          roots_unique="$RUNNER_TEMP/llama-roots-unique.txt"

          find "target/${TARGET_TRIPLE}/release/build" -type f -path "*/llama-cpp-sys-4-*/output" > "$output_files" 2>/dev/null || true
          if [[ ! -s "$output_files" ]]; then
            find target -type f -path "*/build/llama-cpp-sys-4-*/output" > "$output_files" 2>/dev/null || true
          fi

          : > "$roots_raw"
          while IFS= read -r output; do
            sed -n 's/^cargo:root=//p' "$output" >> "$roots_raw" || true
          done < "$output_files"
          sort -u "$roots_raw" > "$roots_unique"

          copied=0
          while IFS= read -r root; do
            [[ -n "$root" && -d "$root" ]] || continue
            echo "Collecting from root: $root"
            for subdir in lib lib64 bin; do
              dir="$root/$subdir"
              [[ -d "$dir" ]] || continue
              while IFS= read -r -d '' f; do
                cp -f "$f" "$ROOT/$subdir/$(basename "$f")"
                copied=$((copied + 1))
              done < <(find "$dir" -maxdepth 1 -type f \( -name '*.a' -o -name '*.dylib' \) -print0)
            done
          done < "$roots_unique"

          if [[ "$copied" -eq 0 ]]; then
            echo "No compiled libraries were collected; failing instead of uploading empty artifact." >&2
            echo "Searched output files:" >&2
            sed 's/^/ - /' "$output_files" >&2 || true
            exit 1
          fi

          cat > "$ROOT/metadata.json" <<EOF
          {"target":"${TARGET_TRIPLE}","features":"${{ matrix.features }}","sha":"${GITHUB_SHA}"}
          EOF

          tar -C "$ROOT" -czf "$RUNNER_TEMP/$ASSET_NAME" .
          ls -lh "$RUNNER_TEMP/$ASSET_NAME"
          tar -tzf "$RUNNER_TEMP/$ASSET_NAME"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ runner.temp }}/${{ env.ASSET_NAME }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag }}" "$RUNNER_TEMP/$ASSET_NAME" --clobber
