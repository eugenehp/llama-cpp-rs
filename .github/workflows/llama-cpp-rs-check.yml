name: Llama Cpp Rs Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  check:
    name: Run tests on llama-cpp-rs
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Install Compile Deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run:
          sudo apt-get update && sudo apt-get install -y build-essential curl libssl-dev libclang-dev pkg-config cmake git mold
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Clippy
        run: cargo clippy
      - name: Fmt
        run: cargo fmt
      - name: Test
        run: cargo test --workspace --exclude llama-cpp-4 --exclude openai-server
      - name: sccache stats
        run: sccache --show-stats || true
  linux:
    name: Check that it builds on linux (native)
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Install Compile Deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run:
          sudo apt-get update && sudo apt-get install -y build-essential curl libssl-dev libclang-dev pkg-config cmake git mold
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --workspace --all-targets
      - name: sccache stats
        run: sccache --show-stats || true
  mac:
    name: Check that it builds on mac
    runs-on: macos-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --workspace
      - name: sccache stats
        run: sccache --show-stats || true
  windows:
    name: Check that it builds on windows
    runs-on: windows-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Ensure patch.exe is discoverable
        shell: pwsh
        run: |
          $gitUsrBin = Join-Path $env:ProgramFiles 'Git\usr\bin'
          if (Test-Path $gitUsrBin) {
            if (-not ($env:PATH -split ';' | Where-Object { $_ -ieq $gitUsrBin })) {
              $gitUsrBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --workspace
      - name: Setup Vulkan SDK
        uses: ./.github/actions/setup-vulkan-sdk-windows
      - name: Build Vulkan
        shell: pwsh
        run: cargo build --features vulkan
      - name: Test
        run: cargo test --workspace --exclude llama-cpp-4 --exclude openai-server
      - name: sccache stats
        shell: pwsh
        run: sccache --show-stats