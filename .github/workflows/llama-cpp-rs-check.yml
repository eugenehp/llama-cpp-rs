name: Llama Cpp Rs Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  check:
    name: Run tests on llama-cpp-rs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Install Compile Deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run:
          sudo apt-get update && sudo apt-get install -y build-essential curl libssl-dev libclang-dev pkg-config cmake git
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Clippy
        run: cargo clippy
      - name: Fmt
        run: cargo fmt
      - name: Test
        run: cargo test --workspace --exclude llama-cpp-4
  arm64:
    name: Check that it builds on various targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [ linux/arm64, linux/amd64 ]
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Setup QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        with:
          platforms: arm64,amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Build
        uses: docker/build-push-action@v7
        with:
          file: test-build.Dockerfile
          target: base-cuda
          platforms: ${{ matrix.target }}
  mac:
    name: Check that it builds on mac
    runs-on: macos-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --workspace
  windows:
    name: Check that it builds on windows
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: recursive
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --workspace
      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          choco install vulkan-sdk --yes --no-progress
          $vulkanSdkDir = Get-ChildItem 'C:\VulkanSDK' -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $vulkanSdkDir) {
            throw "Vulkan SDK directory not found after installation"
          }
          "VULKAN_SDK=$($vulkanSdkDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($vulkanSdkDir.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build Vulkan
        shell: pwsh
        run: cargo build --features vulkan
      - name: Test
        run: cargo test --workspace --exclude llama-cpp-4